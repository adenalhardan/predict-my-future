<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Predict My Future — Demo</title>
<style>
  :root {
    --bg: #0a0a0f;
    --card: #13131a;
    --border: #1e1e2a;
    --text: #e4e4ef;
    --muted: #8888a0;
    --positive: #22c55e;
    --bad: #ef4444;
    --insane: #a855f7;
    --funny: #f59e0b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem;
  }
  .header {
    text-align: center;
    margin-bottom: 3rem;
  }
  .header h1 {
    font-size: 2.5rem;
    font-weight: 700;
    background: linear-gradient(135deg, #a855f7, #3b82f6, #22c55e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
  }
  .header p {
    color: var(--muted);
    font-size: 1rem;
  }
  .original-section {
    max-width: 480px;
    margin: 0 auto 3rem;
    text-align: center;
  }
  .original-section h2 {
    font-size: 1.1rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
  }
  .original-section video {
    width: 100%;
    border-radius: 16px;
    border: 1px solid var(--border);
  }
  .scenarios {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 1.5rem;
    max-width: 1400px;
    margin: 0 auto;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }
  .card:hover {
    transform: translateY(-4px);
  }
  .card.positive:hover { border-color: var(--positive); }
  .card.bad:hover { border-color: var(--bad); }
  .card.insane:hover { border-color: var(--insane); }
  .card.funny:hover { border-color: var(--funny); }
  .card video {
    width: 100%;
    display: block;
    aspect-ratio: 9/16;
    object-fit: cover;
    background: #000;
  }
  .card-body {
    padding: 1.25rem;
  }
  .badge {
    display: inline-block;
    padding: 0.25rem 0.75rem;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.75rem;
  }
  .positive .badge { background: rgba(34,197,94,0.15); color: var(--positive); }
  .bad .badge { background: rgba(239,68,68,0.15); color: var(--bad); }
  .insane .badge { background: rgba(168,85,247,0.15); color: var(--insane); }
  .funny .badge { background: rgba(245,158,11,0.15); color: var(--funny); }
  .probability {
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 0.5rem;
  }
  .positive .probability { color: var(--positive); }
  .bad .probability { color: var(--bad); }
  .insane .probability { color: var(--insane); }
  .funny .probability { color: var(--funny); }
  .description {
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Predict My Future</h1>
  <p>What happens next? AI-generated future scenarios.</p>
</div>

<div class="original-section">
  <h2>Original Video</h2>
  <video src="/test/meeting.mp4" controls playsinline muted></video>
</div>

<div class="scenarios" id="scenarios"></div>

<script>
const payload = {
  scenarios: [
    {
      type: "positive",
      description: "65% chance — The speaker's idea is met with enthusiastic agreement and new insights from the listeners.",
      video_url: "/api/videos/cdd80e01-f62b-4465-9660-6dc70686eeb2/positive.mp4"
    },
    {
      type: "bad",
      description: "18% chance — A sudden technical issue disrupts the presentation, causing frustration.",
      video_url: "/api/videos/cdd80e01-f62b-4465-9660-6dc70686eeb2/bad.mp4"
    },
    {
      type: "insane",
      description: "0.1% chance — Gravity suddenly reverses for all inanimate objects in the room, making them float.",
      video_url: "/api/videos/cdd80e01-f62b-4465-9660-6dc70686eeb2/insane.mp4"
    },
    {
      type: "funny",
      description: "7% chance — The speaker accidentally triggers a catchy song and breaks into a spontaneous, awkward dance.",
      video_url: "/api/videos/cdd80e01-f62b-4465-9660-6dc70686eeb2/funny.mp4"
    }
  ]
};

const labels = { positive: "Positive", bad: "Bad", insane: "Insane", funny: "Funny" };

const container = document.getElementById("scenarios");

payload.scenarios.forEach(s => {
  const match = s.description.match(/^([\d.]+%)\s*chance\s*—\s*(.*)/);
  const pct = match ? match[1] : "";
  const desc = match ? match[2] : s.description;

  const card = document.createElement("div");
  card.className = `card ${s.type}`;
  card.innerHTML = `
    <video src="${s.video_url}" controls playsinline muted loop></video>
    <div class="card-body">
      <span class="badge">${labels[s.type]}</span>
      <div class="probability">${pct}</div>
      <p class="description">${desc}</p>
    </div>
  `;
  container.appendChild(card);
});
</script>

</body>
</html>
