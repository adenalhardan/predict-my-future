apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: predictmyfuture
  labels:
    app: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
        - name: server
          image: predictmyfuture.azurecr.io/server:latest
          imagePullPolicy: Always
          env:
            - name: GCS_BUCKET
              value: seecircle-cdn
            - name: GCS_CLIENT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: gcs
                  key: client-email
            - name: GCS_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: gcs
                  key: project-id
            - name: GCS_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: gcs
                  key: private-key
            - name: VEO_MODEL
              value: "veo-3.1-generate-001"
            - name: MAX_VIDEOS
              value: "4"
            - name: GOOGLE_CLOUD_PROJECT
              valueFrom:
                secretKeyRef:
                  name: gcs-ai-studio
                  key: GOOGLE_CLOUD_PROJECT
            - name: GOOGLE_CLOUD_LOCATION
              value: "us-central1"
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gcs-ai-studio
                  key: GOOGLE_API_KEY
